name: Build & Deploy ShopReturnGifts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  SAM_STACK_NAME: shopreturngifts-prod
  STAGE: prod

jobs:
  # ─── Tests ───
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - name: Install frontend
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - name: Frontend tests
        run: npm test -- --run

      - name: Go vulnerability scan
        working-directory: backend
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Backend tests
        working-directory: backend
        run: |
          go mod tidy
          go test ./...

  # ─── Frontend: Build & Deploy React App ───
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # ─── Backend: SAM Build & Deploy ───
  backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [frontend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: backend/go.sum

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/setup-sam@v2

      - name: Prepare Go modules
        working-directory: backend
        run: go mod tidy

      - name: SAM Build
        run: sam build --template template.yaml

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              ParameterKey=Stage,ParameterValue=${{ env.STAGE }} \
              ParameterKey=FrontendDomain,ParameterValue='${{ secrets.FRONTEND_DOMAIN || '*' }}' \
              ParameterKey=ContactFromEmail,ParameterValue='${{ secrets.CONTACT_FROM_EMAIL }}' \
              ParameterKey=ContactToEmail,ParameterValue='${{ secrets.CONTACT_TO_EMAIL }}' \
              ParameterKey=AllowedOrigins,ParameterValue='${{ secrets.ALLOWED_ORIGINS || '*' }}' \
              ParameterKey=CognitoDomainPrefix,ParameterValue='${{ secrets.COGNITO_DOMAIN_PREFIX }}' \
              ParameterKey=GoogleClientId,ParameterValue='${{ secrets.GOOGLE_CLIENT_ID }}' \
              ParameterKey=GoogleClientSecret,ParameterValue='${{ secrets.GOOGLE_CLIENT_SECRET }}'

      - name: Output Stack Info
        run: |
          aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query 'Stacks[0].Outputs' \
            --output table

      - name: Print Backend API Docs URL
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          DOCS_URL="${API_URL}/api/docs"
          echo "Backend API base URL: ${API_URL}"
          echo "Backend API docs URL: ${DOCS_URL}"
          echo "::notice title=Backend API Docs::${DOCS_URL}"

  # ─── Deploy Frontend to S3 + CloudFront ───
  deploy-frontend:
    name: Deploy Frontend to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.event_name == 'push'
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - name: Get S3 bucket and CloudFront ID from stack outputs
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          CF_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          SITE_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='WebsiteUrl'].OutputValue" \
            --output text)
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "cf_id=$CF_ID" >> $GITHUB_OUTPUT
          echo "site_url=$SITE_URL" >> $GITHUB_OUTPUT

      - name: Sync to S3
        run: aws s3 sync dist/ s3://${{ steps.stack.outputs.bucket }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack.outputs.cf_id }} \
            --paths "/*"

      - name: Print website URL
        run: echo "🚀 Site live at ${{ steps.stack.outputs.site_url }}"
