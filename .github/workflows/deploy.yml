name: Build & Deploy ShopReturnGifts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  SAM_STACK_NAME: shopreturngifts   # single CloudFormation stack (source of truth)
  STAGE: prod

jobs:
  # ─── Tests ───
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - name: Install frontend
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - name: Frontend tests
        run: npm test -- --run

      - name: Go vulnerability scan
        working-directory: backend
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Backend tests
        working-directory: backend
        run: |
          go mod tidy
          go test ./...

  # ─── Backend: SAM Build & Deploy ───
  backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: backend/go.sum

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/setup-sam@v2

      - name: Prepare Go modules
        working-directory: backend
        run: go mod tidy

      - name: SAM Build
        run: sam build --template template.yaml

      - name: Resolve domain parameters
        run: |
          # Storefront CORS + API allowed origins: prefer explicit secrets, else derive from DOMAIN_NAME.
          if [ -n "${{ secrets.FRONTEND_DOMAIN }}" ]; then
            echo "FRONTEND_DOMAIN=${{ secrets.FRONTEND_DOMAIN }}" >> $GITHUB_ENV
          elif [ -n "${{ secrets.DOMAIN_NAME }}" ]; then
            echo "FRONTEND_DOMAIN=https://${{ secrets.DOMAIN_NAME }}" >> $GITHUB_ENV
          else
            echo "FRONTEND_DOMAIN=*" >> $GITHUB_ENV
          fi
          if [ -n "${{ secrets.ALLOWED_ORIGINS }}" ]; then
            echo "ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }}" >> $GITHUB_ENV
          elif [ -n "${{ secrets.DOMAIN_NAME }}" ]; then
            echo "ALLOWED_ORIGINS=https://${{ secrets.DOMAIN_NAME }}" >> $GITHUB_ENV
          else
            echo "ALLOWED_ORIGINS=*" >> $GITHUB_ENV
          fi
          echo "FrontendDomain (CORS): $FRONTEND_DOMAIN"
          echo "AllowedOrigins (API middleware): $ALLOWED_ORIGINS"

      - name: Validate domain secrets
        run: |
          DOMAIN='${{ secrets.DOMAIN_NAME }}'
          API='${{ secrets.API_DOMAIN_NAME }}'
          ZONE='${{ secrets.HOSTED_ZONE_ID }}'
          if [ -n "$DOMAIN" ] || [ -n "$API" ]; then
            if [ -z "$ZONE" ]; then
              echo "::error::Set GitHub secret HOSTED_ZONE_ID (Route53 zone for shopreturngifts.com). Required when DOMAIN_NAME or API_DOMAIN_NAME is set."
              exit 1
            fi
            ZONE="${ZONE#/hostedzone/}"
            if ! aws route53 get-hosted-zone --id "$ZONE" >/dev/null 2>&1; then
              echo "::error::HOSTED_ZONE_ID '$ZONE' not found in Route53. In AWS Console: Route53 → Hosted zones → copy the ID for shopreturngifts.com."
              exit 1
            fi
            echo "Route53 hosted zone OK: $ZONE"
          else
            echo "No custom domains configured (DOMAIN_NAME / API_DOMAIN_NAME empty)."
          fi
          if [ -n "$DOMAIN" ] && [[ "$DOMAIN" == http* ]]; then
            echo "::error::DOMAIN_NAME must be a hostname only (shopreturngifts.com), not a URL."
            exit 1
          fi
          if [ -n "$API" ] && [[ "$API" == http* ]]; then
            echo "::error::API_DOMAIN_NAME must be a hostname only (api.shopreturngifts.com), not a URL."
            exit 1
          fi

      - name: Preflight — remove conflicting stacks and orphaned names
        run: |
          set -euo pipefail
          REGION="${{ env.AWS_REGION }}"
          TARGET="${{ env.SAM_STACK_NAME }}"
          STAGE="${{ env.STAGE }}"

          # shopreturngifts-prod uses the same Lambda/Cognito/SNS names (Stage=prod) and blocks a fresh shopreturngifts deploy.
          PROD_STATUS=$(aws cloudformation describe-stacks \
            --stack-name shopreturngifts-prod \
            --region "$REGION" \
            --query 'Stacks[0].StackStatus' \
            --output text 2>/dev/null || echo NOT_FOUND)
          if [ "$PROD_STATUS" != "NOT_FOUND" ]; then
            echo "::error::Stack shopreturngifts-prod still exists (status: $PROD_STATUS)."
            if [ "$PROD_STATUS" = "DELETE_FAILED" ]; then
              echo "::error::DELETE_FAILED — CloudFormation could not remove some resources (often S3 buckets, CloudFront, or API custom domain)."
              echo "::error::From your machine, run: bash scripts/cleanup-failed-stack.sh shopreturngifts-prod"
              echo "::error::Or see failed resources: aws cloudformation describe-stack-events --stack-name shopreturngifts-prod --region $REGION --output table"
            else
              echo "::error::Delete it first — it owns resources this template also creates (shopreturngifts-api-prod, Cognito pool, etc.)."
              echo "::error::Run: aws cloudformation delete-stack --stack-name shopreturngifts-prod --region $REGION"
            fi
            exit 1
          fi

          # Legacy subscribe/static-site stack must not occupy the shopreturngifts stack name.
          LEGACY=$(aws cloudformation describe-stacks \
            --stack-name "$TARGET" \
            --region "$REGION" \
            --query "Stacks[0].Outputs[?OutputKey=='SubscribeApiUrl'].OutputValue" \
            --output text 2>/dev/null || true)
          if [ -n "$LEGACY" ] && [ "$LEGACY" != "None" ]; then
            echo "::error::Legacy stack '$TARGET' (SubscribeApiUrl) must be deleted before deploying the SAM e-commerce template."
            echo "::error::Run: aws cloudformation delete-stack --stack-name $TARGET --region $REGION"
            exit 1
          fi

          # Orphaned API Gateway custom domain from a failed/partial deploy blocks ApiCustomDomain creation.
          API_DOMAIN='${{ secrets.API_DOMAIN_NAME }}'
          if [ -n "$API_DOMAIN" ]; then
            if aws apigateway get-domain-name --domain-name "$API_DOMAIN" --region "$REGION" >/dev/null 2>&1; then
              OWNER=$(aws apigateway get-domain-name --domain-name "$API_DOMAIN" --region "$REGION" --query 'tags.aws:cloudformation:stack-name' --output text 2>/dev/null || echo "")
              if [ "$OWNER" != "$TARGET" ] && [ "$OWNER" != "None" ] && [ -n "$OWNER" ]; then
                echo "::error::API Gateway domain $API_DOMAIN is owned by stack '$OWNER'. Delete that stack or remove the domain before redeploying."
                exit 1
              fi
              if [ "$OWNER" = "None" ] || [ -z "$OWNER" ]; then
                echo "::warning::API Gateway domain $API_DOMAIN exists outside CloudFormation. Delete it in API Gateway → Custom domain names if deploy fails."
              fi
            fi
          fi

          # Lambda names are global per region; catch orphans if shopreturngifts-prod stack was deleted incompletely.
          for FN in "shopreturngifts-api-${STAGE}" "shopreturngifts-email-worker-${STAGE}" "shopreturngifts-cognito-message-${STAGE}"; do
            if aws lambda get-function --function-name "$FN" --region "$REGION" >/dev/null 2>&1; then
              FN_STACK=$(aws lambda get-function --function-name "$FN" --region "$REGION" \
                --query 'Tags."aws:cloudformation:stack-name"' --output text 2>/dev/null || echo "")
              if [ "$FN_STACK" != "$TARGET" ]; then
                echo "::error::Lambda $FN already exists (stack tag: ${FN_STACK:-orphan}). Delete stack shopreturngifts-prod or remove this function before deploy."
                exit 1
              fi
            fi
          done

          echo "Preflight OK for stack $TARGET"

      - name: SAM Deploy
        env:
          P_STAGE: ${{ env.STAGE }}
          P_FRONTEND_DOMAIN: ${{ env.FRONTEND_DOMAIN }}
          P_ALLOWED_ORIGINS: ${{ env.ALLOWED_ORIGINS }}
          P_DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }}
          P_API_DOMAIN_NAME: ${{ secrets.API_DOMAIN_NAME }}
          P_HOSTED_ZONE_ID: ${{ secrets.HOSTED_ZONE_ID }}
          P_CONTACT_FROM: ${{ secrets.CONTACT_FROM_EMAIL }}
          P_CONTACT_TO: ${{ secrets.CONTACT_TO_EMAIL }}
          P_COGNITO_PREFIX: ${{ secrets.COGNITO_DOMAIN_PREFIX }}
          P_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          P_GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          # SAM rejects empty values (e.g. ContactFromEmail=). Omit unset secrets; template defaults apply.
          PARAMS=(
            "Stage=${P_STAGE}"
            "FrontendDomain=${P_FRONTEND_DOMAIN}"
            "AllowedOrigins=${P_ALLOWED_ORIGINS}"
          )
          add_param() {
            local key="$1" val="$2"
            if [ -n "$val" ]; then
              PARAMS+=("${key}=${val}")
            fi
          }
          add_param DomainName "$P_DOMAIN_NAME"
          add_param ApiDomainName "$P_API_DOMAIN_NAME"
          add_param HostedZoneId "$P_HOSTED_ZONE_ID"
          add_param ContactFromEmail "$P_CONTACT_FROM"
          add_param ContactToEmail "$P_CONTACT_TO"
          add_param CognitoDomainPrefix "$P_COGNITO_PREFIX"
          add_param GoogleClientId "$P_GOOGLE_CLIENT_ID"
          add_param GoogleClientSecret "$P_GOOGLE_CLIENT_SECRET"
          echo "SAM parameters: ${PARAMS[*]}"
          sam deploy \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --region ${{ env.AWS_REGION }} \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides "${PARAMS[@]}"

      - name: Output Stack Info
        run: |
          aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query 'Stacks[0].Outputs' \
            --output table

      - name: Print Backend API Docs URL
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)
          CUSTOM_API=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendApiBaseUrl'].OutputValue" \
            --output text)
          DOCS_URL="${API_URL}/api/docs"
          echo "Backend API base URL: ${API_URL}"
          if [ -n "$CUSTOM_API" ] && [ "$CUSTOM_API" != "None" ]; then
            echo "Custom API (VITE_API_BASE_URL): ${CUSTOM_API}"
            echo "::notice title=Frontend API URL::${CUSTOM_API}"
          fi
          echo "Backend API docs URL: ${DOCS_URL}"
          echo "::notice title=Backend API Docs::${DOCS_URL}"
          SITE_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='WebsiteUrl'].OutputValue" \
            --output text)
          echo "Storefront URL: ${SITE_URL}"
          echo "::notice title=Storefront URL::${SITE_URL}"

  # ─── Frontend: Build React App (after backend so API URL comes from stack) ───
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: [backend]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve VITE_API_BASE_URL
        id: api
        run: |
          CUSTOM_API=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendApiBaseUrl'].OutputValue" \
            --output text 2>/dev/null || true)
          if [ -n "$CUSTOM_API" ] && [ "$CUSTOM_API" != "None" ]; then
            echo "base_url=$CUSTOM_API" >> $GITHUB_OUTPUT
            echo "Using custom API domain: $CUSTOM_API"
          elif [ -n "${{ secrets.VITE_API_BASE_URL }}" ]; then
            echo "base_url=${{ secrets.VITE_API_BASE_URL }}" >> $GITHUB_OUTPUT
            echo "Using VITE_API_BASE_URL secret"
          else
            EXEC_API=$(aws cloudformation describe-stacks \
              --stack-name ${{ env.SAM_STACK_NAME }} \
              --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
              --output text)
            echo "base_url=${EXEC_API}/api" >> $GITHUB_OUTPUT
            echo "Using execute-api URL: ${EXEC_API}/api"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: ${{ steps.api.outputs.base_url }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}
          STRIPE_PUBLISHABLE_KEY: ${{ secrets.STRIPE_PUBLISHABLE_KEY }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7

  # ─── Deploy Frontend to S3 + CloudFront ───
  deploy-frontend:
    name: Deploy Frontend to S3 + CloudFront
    runs-on: ubuntu-latest
    needs: [frontend]
    if: github.event_name == 'push'
    steps:
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Download frontend build
        uses: actions/download-artifact@v7
        with:
          name: frontend-dist
          path: dist/

      - name: Get S3 bucket and CloudFront ID from stack outputs
        id: stack
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          CF_ID=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          SITE_URL=$(aws cloudformation describe-stacks \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --query "Stacks[0].Outputs[?OutputKey=='WebsiteUrl'].OutputValue" \
            --output text)
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "cf_id=$CF_ID" >> $GITHUB_OUTPUT
          echo "site_url=$SITE_URL" >> $GITHUB_OUTPUT

      - name: Sync to S3
        run: aws s3 sync dist/ s3://${{ steps.stack.outputs.bucket }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.stack.outputs.cf_id }} \
            --paths "/*"

      - name: Print website URL
        run: echo "🚀 Site live at ${{ steps.stack.outputs.site_url }}"
